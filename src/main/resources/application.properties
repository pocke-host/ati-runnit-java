spring.application.name=runnit-api
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}/${DB_NAME:runnit_db}?sslMode=VERIFY_IDENTITY&serverTimezone=UTC&autoReconnect=true&connectTimeout=30000&socketTimeout=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:newpassword123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.flyway.enabled=false

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-min-256-bits-long}
jwt.expiration=86400000

aws.s3.bucket=${S3_BUCKET_NAME:runnit-uploads}
aws.region=${AWS_REGION:us-west-2}

logging.level.com.runnit=DEBUG

strava.client.id=${STRAVA_CLIENT_ID:}
strava.client.secret=${STRAVA_CLIENT_SECRET:}
strava.redirect.uri=${STRAVA_REDIRECT_URI:https://ati-runnit-java.onrender.com/api/integrations/strava/callback}
app.frontend.url=${FRONTEND_URL:https://runnit.live}

garmin.consumer.key=${GARMIN_CONSUMER_KEY:}
garmin.consumer.secret=${GARMIN_CONSUMER_SECRET:}
garmin.callback.uri=${GARMIN_CALLBACK_URI:https://ati-runnit-java.onrender.com/api/garmin/oauth/callback}
