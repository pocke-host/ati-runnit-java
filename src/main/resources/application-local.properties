# Local dev profile — uses local MySQL, skips SSL, enables Flyway
# Start with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
# Or in IntelliJ: Edit Configurations → Active profiles: local

spring.datasource.url=jdbc:mysql://localhost:3306/runnit_db?serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=newpassword123

# Faster pool for local dev
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=10000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.flyway.enabled=false

logging.level.com.runnit=DEBUG
